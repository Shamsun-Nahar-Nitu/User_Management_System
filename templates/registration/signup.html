<!-- templates/registration/signup.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
</head>
<body>
    <h2>Sign Up</h2>
    
    <!-- CRITICAL: enctype="multipart/form-data" is required for the profile_picture upload -->
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Sign Up</button>
    </form>
    
    <p>Already have an account? <a href="{% url 'login' %}">Log In</a></p>
</body>
</html>
