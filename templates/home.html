<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
</head>
<body>
    <h1>Homepage</h1>
    {% if user.is_authenticated %}
        <p>Hi, {{ user.username }}! You are logged in.</p>
        <form action="{% url 'logout' %}" method="post">
            {% csrf_token %}
            <button type="submit">Log Out</button>
        </form>
    {% else %}
        <p>You are not logged in.</p>
        <a href="{% url 'login' %}">Log In Here</a>
    {% endif %}
</body>
</html>
